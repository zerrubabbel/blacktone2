## kitty.conf ##
## ~/.config/kitty/kitty.conf

font_size 18.0

cursor #05ffa1
cursor_text_color #002811
shell_integration no-cursor
cursor_shape block

#hide_window_decorations yes

background_opacity 0.8
background_blur 24
foreground #05ffa1
background #000810

tab_bar_edge top
tab_bar_margin_height 4.0 4.0
tab_bar_min_tabs 0
tab_bar_style powerline
#: fade, slant, powerline
tab_powerline_style angled
#: angled, slanted, round
active_tab_foreground #002811
active_tab_background #FF8B00
active_tab_font_style bold
inactive_tab_foreground #ff22bb
inactive_tab_background #002811
